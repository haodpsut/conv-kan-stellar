name: csnet
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # PyTorch + CUDA (for H200 use pytorch-cuda=12.4 or newer)
  - pytorch=2.4
  - pytorch-cuda=12.1
  - torchvision
  # Numerical stack
  - numpy
  - scipy
  - scikit-learn
  - pandas
  - pyarrow
  - h5py
  # Astronomy
  - astropy
  # Plotting
  - matplotlib
  - seaborn
  # Utilities
  - pyyaml
  - tqdm
  - rich
  - psutil
  # Dev
  - pytest
  - ipython
  - jupyter
  # Web demo (AstroClassify Streamlit app)
  - streamlit>=1.30
  - plotly>=5.18
  # Pip-only packages
  - pip:
      - mlflow>=2.14
      - einops
      # For H200-only optimizations, install separately AFTER env created:
      #   pip install transformer-engine   # FP8 + fused kernels
      #   pip install nvidia-dali-cuda120  # data loading on GPU
      #   pip install mamba-ssm causal-conv1d  # 1D Mamba baseline
